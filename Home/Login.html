<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

    <div class="login-box">

        <h1>Student Profile Login</h1>

        <p class="login-text">
            Welcome back! Please enter your username and password to access your Student Profile.
        </p>

        <form action="Profile.html">

        <label for="email"><strong>Gmail Address</strong></label>

        <input
        type="email"
        id="email"
        name="email"
        placeholder="example@gmail.com"
        pattern="[a-zA-Z0-9._%+-]+@gmail\.com"
        title="Please enter a valid Gmail address."
        required>
        
        <label for="password"><strong>Password</strong></label>

        <input
        type="password"
        id="password"
        name="password"
        placeholder="Enter your password"
        minlength="8"
        pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}"
        title="Password must contain at least 8 characters, one uppercase letter, one lowercase letter, one number and one special character."
        required>

        
       <div class="button-container">  
        
        <button type="submit" class="button">Log In</button> 
    
       </div>

        </form>

        <a href="CoverPage.html" class="button">← Back to Cover Page</a>

    </div>

</body>

</html>
